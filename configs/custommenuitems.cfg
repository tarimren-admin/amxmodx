// 菜单前端插件配置
// 用途：向"amxmodmenu"（管理员菜单）或"amx_menu"(普通玩家菜单)添加自定义菜单项
// 使用本配置文件，可以将任何插件的菜单项添加到 "Menus Front-End" 插件中，即："amxmodmenu"中.
// 同时，还可以将菜单项添加到非管理员客户端菜单 "amx_menu"中.
//
// 增加到"amxmodmenu":
// 用法: "amx_addmenuitem <menu text> <menu command> <access flags> <plugin name>"
//
// 增加到"amx_menu":
// 用法: "amx_addclientmenuitem <menu text> <menu command> <access flags> <plugin name>"
//
// <menu text>: 菜单中显示的菜单项的文本.
// <menu command>: 用于访问菜单的客户端命令.
// <access flags>: 管理员必须具有相应权限才能使用此菜单项. (权限详见users.ini.)
// <plugin name>: 必须是插件的确切名称(不缺分大小写) . (在控制台中使用"amxx plugins",插件名称在Names列中列出.)
//
// 举例: (请务必在带有空格的参数前后使用引号！)
//
// amx_addmenuitem "Weapon Arena" "weaponarena_menu" "hu" "Weapon Arena"
// amx_addclientmenuitem "Warcraft 3" "war3menu" "" "Warcraft 3 XP"

