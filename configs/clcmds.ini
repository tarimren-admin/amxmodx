; 菜单配置文件
; 功能：客户端命令配置
; 用途：定义客户端可执行的命令及权限
; 文件位置：$moddir/addons/amxmodx/configs/clcmds.ini
; 与玩家菜单插件一起使用

; 注意：默认情况下，所有设置的访问级别都设置为 "u".
; 可以进行更改，以限制对某些设置的访问.

; 客户端命令菜单：; <描述> <命令> <标志> <访问级别>
; "a" - 从服务器控制台执行
; "b" - 从管理员控制台执行
; "c" - 对选定的玩家执行
; "d" - 执行后返回菜单

"Kick player" 		"amx_kick #%userid%"		"b"	"u"
"Slay player" 		"amx_slay #%userid%"		"bd"	"u"
"Slap with 1 dmg." 	"amx_slap #%userid% 1"		"bd"	"u"
"Ban for 5 minutes" 	"amx_ban #%userid% 5"		"b"	"u"
