// SQL配置文件
// 用途：配置AMX Mod X连接数据库的参数(用于数据存储等)
// 文件位置： $moddir/addons/amxmodx/configs/sql.cfg

// *注意* 如果指定"localhost"而不是"127.0.0.1",Linux用户可能会遇到问题
// 建议使用服务器IP地址而不是名称

// *注意 * amx_sql_type 指定了admin.sma将使用的默认数据库类型.

amx_sql_host    "127.0.0.1"
amx_sql_user    "root"
amx_sql_pass    ""
amx_sql_db      "amx"
amx_sql_table   "admins"
amx_sql_type    "mysql"
amx_sql_timeout "60"
