// AMXModX 核心配置文件
// 作用：配置AMXModX核心运行参数
// 用途：配置AMX Mod X的核心运行参数，与core.txt功能类似，部分参数可能重复
// 汉化人：毛毛的老公
// 汉化时间：2026年4月30日

echo 执行 AMXModX 核心配置文件

// 所有非管理员玩家的默认权限(详见users.ini文件查看权限细节)
//
// 默认值: "z"
amx_default_access "z"

// 客户端存储密码的setinfo的名称(应更改此项)
// 注意：始终在字段前加下划线(即："_")
// (示例：setinfo _pw "password")
//
// 默认值: "_pw"
amx_password_field "_pw"

// 服务器日志记录模式
// 0 - 禁用日志记录.不检查玩家权限(也不会设置玩家权限)
// 1 - 正常模式.遵循账户中设置的权限标志
// 2 - 踢出所有不在名单列表中的玩家
//
//  默认值: 1
amx_mode 1

// 显示管理员操作
// 0 - 禁用
// 1 - 不显示管理员名称
// 2 - 显示管理员名称
// 3 - 仅对管理员显示名称，对普通用户隐藏名称
// 4 - 仅对管理员显示名称，对普通用户不显示任何信息
// 5 - 仅对管理员隐藏名称，对普通用户不显示任何信息
//
// 默认值: 2
amx_show_activity 2

// 滚动消息和文本的频率(秒)
//
// 默认值: "Welcome to %hostname% -- This server is using AMX Mod X" 600
//amx_scrollmsg "欢迎来到 %hostname% -- 服务器正在使用 AMX Mod X" 600

// 居中显示带有颜色的消息(最后的参数是颜色代码,格式为:RRRGGGBBB)
//
// 默认值: "Welcome to %hostname%" "000255100"
//                 "This server is using AMX ModX\nVisit http://www.amxmodx.org" "000100255"
//amx_imessage "欢迎来到 %hostname%" "000255100"
//amx_imessage "服务器使用 AMX Mod X\n访问网址: http://www.amxmodx.org" "000100255"

// 彩色消息的频率(秒)
//
// 默认值: 180
amx_freq_imessage 180

// 封禁菜单(amx_banmenu)中可选择的封禁时长(分钟) (amx_banmenu)
// 使用 0 表示永久封禁
// 默认值: 0 5 10 15 30 45 60
amx_plmenu_bantimes 0 5 10 15 30 45 60

// 临时封禁的最大时长(拥有 ADMIN_BAN_TEMP 权限的管理员无法封禁超过此时长)
// 时长(分钟), 60 表示 1 小时，120 表示 2 小时，1440 表示 1 天，10080 表示 1 周
// 默认值: 4320. 即3天
amx_tempban_maxtime 4320

// 玩家惩戒菜单中可选的伤害值(控制台中使用amx_slapmenu调用惩戒菜单)
// "处死" 选项将自动作为最后一个选项
// 默认值: 0 1 5
amx_plmenu_slapdmg 0 1 5

// 设置玩家聊天的最短间隔(秒).(防止恶意刷屏)
//
// 默认值: 0.75
amx_flood_time 0.75

// 服务器预留通道数量.
//
// 默认值: 0
amx_reservation 0

// 如果设置为 1 ，则可隐藏服务器上的预留通道.
// 如公共通道已满且预留通道被隐藏，则须使用控制台 connect 命令手动连接服务器
//
// 默认值: 0
amx_hideslots 0

// 剩余时间显示方式
// a - 在底部显示白字
// b - 使用语音来提示
// c - 不显示"剩余时间",只用语音提示
// d - 不显示"时/分/秒",只用语音提示
// e - 如果当前时间小于设定的值,显示文本的同时使用语音
//
// 默认值: "ab 1200" "ab 600" "ab 300" "ab 180" "ab 60" "bcde 11"
amx_time_display "ab 1200" "ab 600" "ab 300" "ab 180" "ab 60" "bcde 11"

// 发送 "say thetime" 或 "say timeleft" 命令时是否启用语音
// 0 - 禁用| 1- 启用.
//
// 默认值: 1
amx_time_voice 1

// 两次投票之间的最小延迟时间(秒)
//
// 默认值: 10
amx_vote_delay 10

// 投票持续时间
//
// 默认值: 10
amx_vote_time 10

// 是否显示玩家的投票具体情况
// 0 - 禁用|1 - 启用.
//
// 默认值: 1
amx_vote_answers 1

// 投票成功的比率要求

// 投票踢人比率
// 默认值: 0.40
amx_votekick_ratio 0.40

// 投票封禁比率
// 默认值: 0.40
amx_voteban_ratio 0.40

// 投票换图比率
// 默认值: 0.40
amx_votemap_ratio 0.40

// 其他投票比率
// 默认值: 0.02
amx_vote_ratio 0.02

// 地图可延长的最长时间(分钟)
//
// 默认值: 90
amx_extendmap_max 90

// 每次地图延长的时长(分钟)
//
// 默认值: 15
amx_extendmap_step 15

// 服务器语言，使用(ISO 639-1)格式
// 查看 data/lang/languages.txt 文件以获取支持的语言列表
//
// 默认值: en
amx_language "cn"

// 如设置为 0，则客户端无法选择语言
// 将使用服务器配置的语言.
//
// 默认值: 1
amx_client_languages 1

// 如设置为 0 ，则客户端在进入服务器时不会看到关于 amx_langmenu 的提示消息
//
// 默认值: 1
amx_language_display_msg 0

// 如设置为 0 ，则客户端在进入服务器时不会看到关于 amx_help 的提示消息
//
// 默认值: 1
amx_help_display_msg 0

// 客户端进入服务器后，显示关于 amx_help 的提示消息前的等待时长(秒)
//
// 默认值: 15
amx_help_display_msg_time 15

// 每页 amx_help 显示的命令数量
//
// 默认值: 10
amx_help_amount_per_page 10

// 插件调试模式
// 0 - 禁用调试 (行号无效)
// 1 - 在 plugins.ini 中带有 "debug" 选项的插件将进入调试模式
// 2 - 所有插件都进入调试模式
// 注意 - 调试模式会影响 JIT 性能
//
// 默认值: 1
amx_debug 1

// 插件多语言调试
// 若要调试某种语言，将其两个字母的代码放在引号中(如："en"、"de" 等)
// "" 表示禁用多语言调试
//
// 默认值: ""
amx_mldebug ""

//
// Counter-Strike专属配置部分.
//

// 排名模式
// 0 - 按昵称排名
// 1 - 按 authid 排名
// 2 - 按 IP地址 排名
//
// 默认值: 1
csstats_rank 1

// 统计文件的最大大小(KB)
//
// 默认值: 3500
csstats_maxsize 3500

// 是否使用csstats对机器人进行排名
// 1 - 对机器人排名| 0 - 机器人不参与排名.
//
// 默认值: 0
csstats_rankbots 0

// HUD统计信息的显示时长(秒)
//
// 默认值: 12.0
amx_statsx_duration 12.0

// HUD 统计信息显示的结束时间相对于回合冻结结束时间的偏移量(秒)
// 负数表示在回合冻结时间结束前清除HUD统计信息
//
// 默认值: -2.0
amx_statsx_freeze -2.0

// 设置 Restrict Weapons 插件是否为每张地图使用单独的配置文件.
// 如果启用，文件格式为：weaprest_mapname.ini(如 weaprest_de_dust.ini).
// -
// 默认值: 0
amx_restrmapsettings 0

// 性能监控
//
// 如果函数执行时间超过 amx_perflog_ms 毫秒
// 将插件和函数名称记录到当前的 amxmodx 日志文件中.
//
// 时间单位为毫秒
// 默认值: 1.0
// 
amx_perflog_ms 1.0
