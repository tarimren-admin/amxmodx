; 菜单配置文件
; 功能：服务器命令配置
; 用途：定义服务器端可执行的命令及权限
; 文件位置：$moddir/addons/amxmodx/configs/cmds.ini
; 与命令菜单插件一起使用

; 注意：默认情况下，所有设置的访问级别都设置为 "u"。
; 但是您可以进行更改，以限制对某些设置的访问。

; 命令菜单：; <描述> <命令> <标志> <访问级别>
; "a" - 从服务器控制台执行
; "b" - 从管理员控制台执行
; "c" - 执行到所有客户端
; "d" - 执行后返回菜单

"Pause"		"amx_pause"		"ad"	"u"
" "		"-"			""	"u"
"Restart Round"	"sv_restartround 1"	"a"	"u"
